services:
  frankenphp:
    build:
      context: .
      target: app
    image: kasir-frankenphp:latest
    restart: unless-stopped
    ports:
      - '${APP_PORT:-8000}:80'
    environment:
      - APP_NAME=${APP_NAME:-Kasir Fotocopy}
      - APP_ENV=production
      - APP_KEY=${APP_KEY:?Set APP_KEY in .env before running Docker Compose}
      - APP_DEBUG=false
      - APP_URL=${APP_URL:-http://localhost:8000}
      - LOG_CHANNEL=stderr
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-kasir}
      - DB_USERNAME=${DB_USERNAME:-kasir}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=database
      - SESSION_DRIVER=database
      - REDIS_CLIENT=phpredis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RUN_MIGRATIONS=${RUN_MIGRATIONS:-true}
    volumes:
      - kasir-storage:/app/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=${DB_DATABASE:-kasir}
      - MYSQL_USER=${DB_USERNAME:-kasir}
      - MYSQL_PASSWORD=${DB_PASSWORD:-secret}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-root}
    volumes:
      - kasir-mysql:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uroot', '-p${DB_ROOT_PASSWORD:-root}']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - kasir-redis:/data

volumes:
  kasir-storage:
  kasir-mysql:
  kasir-redis:
